services:
  postgres:
    image: postgres:15
    container_name: nexo-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-nexo}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nexo}
      POSTGRES_DB: ${DB_NAME:-nexo}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-nexo} -d ${DB_NAME:-nexo}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: nexo-api
    environment:
      SPRING_PROFILES_ACTIVE: local
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-nexo}
      DB_USER: ${DB_USER:-nexo}
      DB_PASSWORD: ${DB_PASSWORD:-nexo}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    profiles:
      - app

volumes:
  postgres_data:
