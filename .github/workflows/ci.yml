name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: nexo
          POSTGRES_PASSWORD: nexo
          POSTGRES_DB: nexo
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nexo -d nexo"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Wait for PostgreSQL readiness
        env:
          PGPASSWORD: nexo
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U nexo -d nexo; then
              exit 0
            fi
            sleep 2
          done
          echo "PostgreSQL did not become ready in time"
          exit 1

      - name: Run tests with Flyway migrations
        timeout-minutes: 10
        env:
          TEST_DB_URL: jdbc:postgresql://localhost:5432/nexo
          TEST_DB_USER: nexo
          TEST_DB_PASSWORD: nexo
          TEST_DB_DRIVER: org.postgresql.Driver
          TEST_FLYWAY_URL: jdbc:postgresql://localhost:5432/nexo
          TEST_FLYWAY_USER: nexo
          TEST_FLYWAY_PASSWORD: nexo
        run: ./mvnw -q test
