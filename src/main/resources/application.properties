spring.application.name=nexo
spring.profiles.default=local
app.web.cors.allowed-origins=${APP_WEB_CORS_ALLOWED_ORIGINS:http://localhost:5173}
app.auth.jwt.secret=${APP_AUTH_JWT_SECRET:change-this-local-dev-jwt-secret-key-1234567890}
app.auth.jwt.access-token-ttl=${APP_AUTH_JWT_ACCESS_TOKEN_TTL:PT15M}
app.auth.refresh-token.ttl=${APP_AUTH_REFRESH_TOKEN_TTL:P30D}
app.auth.refresh-token.cookie-name=${APP_AUTH_REFRESH_TOKEN_COOKIE_NAME:nexo_refresh_token}
app.auth.refresh-token.cookie-path=${APP_AUTH_REFRESH_TOKEN_COOKIE_PATH:/auth}
app.auth.refresh-token.cookie-same-site=${APP_AUTH_REFRESH_TOKEN_COOKIE_SAME_SITE:Lax}
app.auth.refresh-token.cookie-secure=${APP_AUTH_REFRESH_TOKEN_COOKIE_SECURE:false}
app.auth.password-reset.token-ttl=${APP_AUTH_PASSWORD_RESET_TOKEN_TTL:PT15M}
app.auth.email-verification.token-ttl=${APP_AUTH_EMAIL_VERIFICATION_TOKEN_TTL:PT24H}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
