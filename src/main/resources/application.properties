spring.application.name=nexo
spring.profiles.default=local
app.web.cors.allowed-origins=${APP_WEB_CORS_ALLOWED_ORIGINS:http://localhost:5173}
app.auth.jwt.secret=${APP_AUTH_JWT_SECRET:change-this-local-dev-jwt-secret-key-1234567890}
app.auth.jwt.access-token-ttl=${APP_AUTH_JWT_ACCESS_TOKEN_TTL:PT24H}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
