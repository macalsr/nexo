spring.datasource.url=${TEST_DB_URL:jdbc:h2:mem:nexo;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE}
spring.datasource.username=${TEST_DB_USER:sa}
spring.datasource.password=${TEST_DB_PASSWORD:}
spring.datasource.driver-class-name=${TEST_DB_DRIVER:org.h2.Driver}

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.url=${TEST_FLYWAY_URL:${spring.datasource.url}}
spring.flyway.user=${TEST_FLYWAY_USER:${spring.datasource.username}}
spring.flyway.password=${TEST_FLYWAY_PASSWORD:${spring.datasource.password}}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
